    <div class="login-box">
        <img src="./images/index/daily_sports_logo.jpg" alt="Daily Sports Logo" width="150" height="150" class="login-logo">

    </div>
        <div class = "bottom">
        <p>The Daily Sports 2026</p>
    </div>

    <script>
        const images = [
            './images/index/background/image1.webp',
            './images/index/background/image2.webp',
            './images/index/background/image3.webp',
            './images/index/background/image4.webp',
            './images/index/background/image5.webp',
            './images/index/background/image6.webp',
            './images/index/background/image7.webp'
        ];

        images.forEach((image) => {
            const img = new Image();
            img.src = image;
            });

        let currentIndex = 0;

        function changeBackground() {
            document.body.style.backgroundImage = `url('${images[currentIndex]}')`;

            currentIndex = (currentIndex + 1) % images.length;
        }

        setInterval(changeBackground, 5000); // Change every 5 seconds
        changeBackground(); // Initial call
    </script>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
netlifyIdentity.on("login", user => {
    fetchWriterData(user);
});

netlifyIdentity.on("init", user => {
    if (user) {
        fetchWriterData(user);
    }
});
</script>
<script>
            async function fetchWriterData(user) {
            const email = user.email;
            const response = await fetch("/.netlify/functions/writer-data", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await response.json();
            currWriter = data.writer;

            if (currWriter.position === "Editor") {
                window.location.href = "/pages/editor.html";
            } else {
                window.location.href = "/pages/dashboard/dashboard.html";
            }
        };
</script>

</body>
