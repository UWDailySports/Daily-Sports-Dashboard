<!--Add Season Modal-->
<div id="add-season-modal" class="modal">
    <div class="add-season-modal-content">
        <div class="modal-header">
            <h2>Add Season</h2>
            <span class="close-button">&times;</span>
        </div>
        <div id="season-drop-zone" class="season-drop-zone">
            <p>Browse or drop files here</p>
            <input type="file" id="season-file-input" accept=".xlsx,.xls,.csv" hidden>
        </div>
        <button id="add-season-confirm" class="add-season-confirm">Add Season</button>
    </div>
</div>
