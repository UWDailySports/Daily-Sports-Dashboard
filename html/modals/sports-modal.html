<!--Sport Modal-->
<div id = "sport-modal" class = "modal">
    <div class = "sport-modal-content">
        <div class = "modal-header">
            <h2>Sports</h2>
            <span class = "close-button">&times;</span>
        </div>
        <button class = "add-sport-button" onclick = "openAddSportModal()">+ Add Sport</button>
        <div class = "sport-table-container" id = "sport-table-container">
            <div class = "sport-table-header">
                <div class = "sport-table-header-section sport-table-sport">Sport</div>
                <div class = "sport-table-header-section sport-table-abbreviation">Abbreviation</div>
                <div class = "sport-table-header-section sport-table-sid">SID</div>
                <div class = "sport-table-header-section sport-table-email">Email</div>
                <div class = "sport-table-header-section sport-table-phone">Phone</div>
                <div class = "sport-table-header-section sport-table-blank"></div>
                <div class = "sport-table-header-section sport-table-options"></div>
            </div>                    
        </div>
    </div>
</div>


<!--Add Sport Modal-->
<div id = "add-sport-modal" class = "modal">
    <div class = "add-sport-modal-content">
        <div class = "modal-header" style = "margin-bottom: 15px;">
            <h2>Add Sport</h2>
            <span class="close-button">&times;</span>
        </div>
        <div class = "add-sport-section-container">
            <div class = "add-sport-section">
                <div class="add-sport-box-title">
                    Sport <span class="required">*</span>
                </div>
                <input type = "text" id = "new-sport-name" class = "add-sport-box" placeholder="Sport Name">
            </div>
            <div class = "add-sport-section">
                <div class="add-sport-box-title">
                    Abbreviation <span class="required">*</span>
                </div>
                <input type = "text" id = "new-sport-abbreviation" class = "add-sport-box" placeholder="Sport Abbreviation">
            </div>
            <div class = "add-sport-section">
                <div class="add-sport-box-title">
                    SID <span class="required">*</span>
                </div>
                <input type = "text" id = "new-sport-sid" class = "add-sport-box" placeholder="SID Name">
            </div>
            <div class = "add-sport-section">
                <div class="add-sport-box-title">
                    SID Email <span class="required">*</span>
                </div>
                <input type = "text" id = "new-sport-email" class = "add-sport-box" placeholder="SID Email">
            </div>
            <div class = "add-sport-section">
                <div class = "add-sport-box-title">SID Phone</div>
                <input type = "text" id = "new-sport-phone" class = "add-sport-box" placeholder="SID Phone">
            </div>
        </div>    
        <button id = "add-sport-confirm" class = "add-sport-confirm">Add Sport</button>
    </div>  
</div>

            <div class = "edit-sport-section">

                    Abbreviation <span class="required">*</span>
                </div>
                <input type = "text" id = "edit-sport-abbreviation" class = "edit-sport-box" placeholder="Sport Name">
            </div>            
            <div class = "edit-sport-section">
                <div class="edit-sport-box-title">
                    SID <span class="required">*</span>

            <div class = "edit-sport-section">
